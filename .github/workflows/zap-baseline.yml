name: OWASP ZAP Baseline

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: Base URL to scan, for example UAT or localhost
        required: true
        default: https://uat.dms.yourbank.com
      report_prefix:
        description: Prefix for generated report files
        required: true
        default: zap-baseline

permissions:
  contents: read

jobs:
  zap-baseline:
    runs-on: ubuntu-latest

    steps:
      - name: Run ZAP baseline scan
        run: |
          docker run --rm -v "${{ github.workspace }}:/zap/wrk/:rw" owasp/zap2docker-stable \
            zap-baseline.py -t "${{ inputs.target_url }}" -r "${{ inputs.report_prefix }}.html" -J "${{ inputs.report_prefix }}.json"

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.report_prefix }}
          path: |
            ${{ inputs.report_prefix }}.html
            ${{ inputs.report_prefix }}.json
